
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberRaksha - Toon Cyber Sentinel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              magenta: '#ff00ff',
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
      :root {
        --neon-magenta: #ff00ff;
        --neon-cyan: #00ffff;
        --neon-lime: #ccff00;
      }
      body { 
        font-family: 'Inter', sans-serif; 
        background-color: #050505;
        background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 0);
        background-size: 20px 20px;
        color: white;
      }
      .toon-card {
        border: 4px solid black;
        box-shadow: 8px 8px 0px 0px black;
        transition: all 0.1s ease;
      }
      .toon-card:active {
        transform: translate(4px, 4px);
        box-shadow: 4px 4px 0px 0px black;
      }
      .glitch-text {
        text-shadow: 2px 0 var(--neon-magenta), -2px 0 var(--neon-cyan);
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      @keyframes pop {
        0% { transform: scale(0.9); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }
      .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
      
      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .animate-spin-slow { animation: spin-slow 10s linear infinite; }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
      }
      .animate-shake { animation: shake 0.2s ease-in-out infinite; }

      pre { white-space: pre-wrap; word-break: break-all; }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",

    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="text-slate-900">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
